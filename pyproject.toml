[tool.black]
line-length = 120
target-version = ["py310"]
extend-exclude = "^outputs/"

[tool.ruff]
line-length = 120
target-version = "py310"
exclude = ["outputs"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
ignore = ["F403", "F405"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["code"]
python_files = ["test_*.py"]
addopts = "-q"
